<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ce9af1 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            color: #ce65b2;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f0f0f0;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .user-info:hover {
            background: #e0e0e0;
            transform: scale(1.02);
        }

        .username-clickable {
            cursor: pointer;
            font-weight: bold;
        }

        .logout-btn {
            background: #bd7474;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #a05a5a;
        }

        /* Auth Forms */
        .auth-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .auth-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 320px;
        }

        .auth-card h3 {
            color: #ce65b2;
            margin-bottom: 20px;
            font-size: 24px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        button {
            background: linear-gradient(135deg, #ce9af1, #764ba2);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.02);
        }

        /* Categories */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .category-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .category-emoji {
            font-size: 50px;
            display: block;
            margin-bottom: 10px;
        }

        .category-name {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        /* Games */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .game-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .game-emoji {
            font-size: 60px;
            margin-bottom: 10px;
        }

        .game-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .game-price {
            color: #ce65b2;
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0;
        }

        .add-to-cart {
            background: linear-gradient(135deg, #ce9af1, #764ba2);
            margin-top: 10px;
        }

        /* Dashboard Layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin: 30px 0;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cart Section */
        .cart-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Purchased Section */
        .purchased-section {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .purchased-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .purchased-count {
            background: #4caf50;
            padding: 5px 15px;
            border-radius: 20px;
            color: white;
        }

        .purchased-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            background: #f9f9f9;
            margin-bottom: 5px;
            border-radius: 10px;
        }

        .purchased-item:hover {
            background: #f0f0f0;
        }

        .purchased-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            font-size: 18px;
            font-weight: bold;
            color: #4caf50;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .remove-item {
            background: #ff6b6b;
            width: auto;
            padding: 5px 15px;
            margin: 0;
            font-size: 14px;
        }

        .cart-total {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e0e0e0;
            font-size: 20px;
            font-weight: bold;
            text-align: right;
        }

        .buy-btn {
            background: linear-gradient(135deg, #f093fb, #7d317d);
            font-size: 18px;
            padding: 15px;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .message.success {
            border-left: 4px solid #4caf50;
            color: #4caf50;
        }

        .message.error {
            border-left: 4px solid #f44336;
            color: #f44336;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .section-title {
            color: white;
            font-size: 28px;
            margin: 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        /* Dashboard toggle button */
        .dashboard-btn {
            background: linear-gradient(135deg, #ce9af1, #764ba2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .dashboard-btn:hover {
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                  Gamer's Paradise 
            </div>
            <div id="userInfo" style="display: none;">
                <div class="user-info" onclick="toggleDashboard()">
                    <span>👤</span>
                    <span id="usernameDisplay" class="username-clickable"></span>
                    <span style="font-size: 12px;">▼</span>
                    <button class="logout-btn" onclick="event.stopPropagation(); logout()">Logout</button>
                </div>
            </div>
        </div>

        <!-- Auth Forms -->
        <div id="authForms">
            <div class="auth-container">
                <div class="auth-card">
                    <h3> Register</h3>
                    <input type="text" id="regUsername" placeholder="Username">
                    <input type="password" id="regPassword" placeholder="Password">
                    <button onclick="register()">Create Account </button>
                </div>
                <div class="auth-card">
                    <h3>Login</h3>
                    <input type="text" id="loginUsername" placeholder="Username">
                    <input type="password" id="loginPassword" placeholder="Password">
                    <button onclick="login()">Explore</button>
                </div>
            </div>
        </div>

        <!-- Main App -->
        <div id="mainApp" style="display: none;">
            <!-- Categories -->
            <h2 class="section-title">Genres</h2>
            <div id="categoriesGrid" class="categories-grid">
                <div class="loading">Loading categories...</div>
            </div>

            <!-- Games -->
            <h2 class="section-title">🎲 Games</h2>
            <div id="gamesContainer">
                <div class="loading">Select a category to see games</div>
            </div>

            <!-- Dashboard (Hidden by default, shows when clicking username) -->
            <div id="dashboard" style="display: none;">
                <h2 class="section-title">📊 Your Dashboard</h2>
                <div class="dashboard">
                    <!-- Cart Section -->
                    <div class="cart-section">
                        <div class="cart-header">
                            <h2>🛒 Your Cart</h2>
                            <span id="cartCount" style="background: #ed8cfe; padding: 5px 15px; border-radius: 20px; color: white;">0 items</span>
                        </div>
                        <div id="cartItems">
                            <p style="text-align: center; color: #999;">Cart is empty 😢</p>
                        </div>
                        <div id="cartTotal" style="display: none;" class="cart-total">
                            Total: $<span id="totalAmount">0</span>
                        </div>
                        <button class="buy-btn" onclick="purchase()"> Purchase All </button>
                    </div>

                    <!-- Purchased Games Section -->
                    <div class="purchased-section">
                        <div class="purchased-header">
                            <h2>🎮 Purchased Games</h2>
                            <span id="purchasedCount" class="purchased-count">0 games</span>
                        </div>
                        <div id="purchasedItems">
                            <p style="text-align: center; color: #999;">No purchases yet 😢</p>
                        </div>
                        <div id="purchasedTotal" style="display: none;" class="purchased-total">
                            Total Spent: $<span id="purchasedAmount">0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';
        let currentUserId = null;
        let currentUsername = null;
        let cart = [];
        let purchasedGames = [];
        let dashboardVisible = false;

        const gameEmojis = {
            'GTA V': '🏙️', 'Call of Duty': '🔫', 'Far Cry': '🐯', 'Assassin\'s Creed': '🗡️', 'Watch Dogs': '🐕',
            'Witcher 3': '🐺', 'Honkai Star Rail': '🚂', 'Elden Ring': '👑', 'Cyberpunk': '🤖', 'Genshin Impact': '⭐',
            'FIFA': '⚽', 'NBA 2K': '🏀', 'Madden NFL': '🏈', 'WWE 2K': '🤼', 'PES': '⚽',
            'NFS': '🏎️', 'Forza': '🏁', 'Gran Turismo': '🚗', 'F1': '🏎️', 'Hill Climb Racing': '⛰️',
            'Resident Evil': '🧟', 'Outlast': '👻', 'Silent Hill': '🌫️', 'Phasmophobia': '👹', 'Dead Space': '👾'
        };

        function showMessage(msg, type = 'success') {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = msg;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }

        function toggleDashboard() {
            const dashboard = document.getElementById('dashboard');
            if (dashboardVisible) {
                dashboard.style.display = 'none';
                dashboardVisible = false;
            } else {
                dashboard.style.display = 'block';
                dashboardVisible = true;
                // Refresh data when opening dashboard
                loadPurchasedGames();
                loadCart();
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            
            if (!username || !password) {
                showMessage('Please fill all fields!', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/register?username=${username}&password=${password}`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('Registration successful! Please login.');
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regPassword').value = '';
                } else {
                    showMessage(data.detail || 'Registration failed', 'error');
                }
            } catch (error) {
                showMessage('Cannot connect to server!', 'error');
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showMessage('Please fill all fields!', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/login?username=${username}&password=${password}`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (response.ok) {
                    currentUserId = data.user_id;
                    currentUsername = data.username;
                    
                    showMessage(`Welcome ${username}!`);
                    
                    document.getElementById('authForms').style.display = 'none';
                    document.getElementById('mainApp').style.display = 'block';
                    document.getElementById('userInfo').style.display = 'block';
                    document.getElementById('usernameDisplay').textContent = username;
                    
                    await loadCategories();
                    await loadCart();
                    await loadPurchasedGames();
                } else {
                    showMessage(data.detail || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('Cannot connect to server!', 'error');
            }
        }

        function logout() {
            currentUserId = null;
            currentUsername = null;
            cart = [];
            purchasedGames = [];
            dashboardVisible = false;
            document.getElementById('authForms').style.display = 'block';
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('userInfo').style.display = 'none';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            showMessage('Logged out! 👋');
        }

        async function loadCategories() {
            try {
                const response = await fetch(`${API_BASE}/api/categories`);
                const categories = await response.json();
                
                const grid = document.getElementById('categoriesGrid');
                grid.innerHTML = '';
                
                const emojis = {1: '⚡', 2: '🗡️', 3: '⚽', 4: '🏎️', 5: '👻'};
                
                categories.forEach(cat => {
                    const card = document.createElement('div');
                    card.className = 'category-card';
                    card.onclick = () => loadGames(cat.id);
                    card.innerHTML = `
                        <span class="category-emoji">${emojis[cat.id]}</span>
                        <div class="category-name">${cat.name}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                showMessage('Failed to load categories', 'error');
            }
        }

        async function loadGames(categoryId) {
            try {
                const response = await fetch(`${API_BASE}/api/games/${categoryId}`);
                const games = await response.json();
                
                const container = document.getElementById('gamesContainer');
                container.innerHTML = '<div class="games-grid"></div>';
                const grid = container.querySelector('.games-grid');
                
                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <div class="game-emoji">${gameEmojis[game.name] || '🎮'}</div>
                        <div class="game-name">${game.name}</div>
                        <div class="game-price">$${game.price}</div>
                        <button class="add-to-cart" onclick="addToCart(${game.id}, '${game.name}')">➕ Add to Cart</button>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                showMessage('Failed to load games', 'error');
            }
        }

        async function addToCart(gameId, gameName) {
            if (!currentUserId) {
                showMessage('Please login first!', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/cart/add?user_id=${currentUserId}&game_id=${gameId}`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(`${gameName} added to cart! 🛒`);
                    await loadCart();
                    if (dashboardVisible) {
                        updateCartDisplay();
                    }
                } else {
                    showMessage(data.detail || 'Failed to add to cart', 'error');
                }
            } catch (error) {
                showMessage('Error adding to cart', 'error');
            }
        }

        async function loadCart() {
            if (!currentUserId) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/cart/${currentUserId}`);
                cart = await response.json();
                updateCartDisplay();
            } catch (error) {
                console.error('Error loading cart:', error);
            }
        }

        function updateCartDisplay() {
            const cartContainer = document.getElementById('cartItems');
            const cartTotalDiv = document.getElementById('cartTotal');
            const totalSpan = document.getElementById('totalAmount');
            const cartCount = document.getElementById('cartCount');
            
            if (!cartContainer) return;
            
            if (cart.length === 0) {
                cartContainer.innerHTML = '<p style="text-align: center; color: #999;">Cart is empty ! </p>';
                cartTotalDiv.style.display = 'none';
                cartCount.textContent = '0 items';
                return;
            }
            
            cartContainer.innerHTML = '';
            let total = 0;
            
            cart.forEach(game => {
                total += game.price;
                const item = document.createElement('div');
                item.className = 'cart-item';
                item.innerHTML = `
                    <div>
                        <strong>${game.name}</strong><br>
                        <small style="color: #667eea;">$${game.price}</small>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${game.id})">Remove</button>
                `;
                cartContainer.appendChild(item);
            });
            
            totalSpan.textContent = total.toFixed(2);
            cartTotalDiv.style.display = 'block';
            cartCount.textContent = `${cart.length} item${cart.length !== 1 ? 's' : ''}`;
        }

        async function removeFromCart(gameId) {
            try {
                const response = await fetch(`${API_BASE}/api/cart/remove?user_id=${currentUserId}&game_id=${gameId}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    showMessage('Removed from cart!');
                    await loadCart();
                }
            } catch (error) {
                showMessage('Error removing item', 'error');
            }
        }

        async function loadPurchasedGames() {
            if (!currentUserId) return;
            
            try {
                const response = await fetch(`${API_BASE}/api/purchased/${currentUserId}`);
                if (response.ok) {
                    purchasedGames = await response.json();
                    console.log('Loaded purchased games:', purchasedGames);
                    updatePurchasedDisplay();
                } else {
                    purchasedGames = [];
                    updatePurchasedDisplay();
                }
            } catch (error) {
                console.error('Error loading purchased games:', error);
                purchasedGames = [];
                updatePurchasedDisplay();
            }
        }

        function updatePurchasedDisplay() {
            const purchasedContainer = document.getElementById('purchasedItems');
            const purchasedCountSpan = document.getElementById('purchasedCount');
            const purchasedTotalDiv = document.getElementById('purchasedTotal');
            const purchasedAmountSpan = document.getElementById('purchasedAmount');
            
            if (!purchasedContainer) return;
            
            if (purchasedGames.length === 0) {
                purchasedContainer.innerHTML = '<p style="text-align: center; color: #999;">No purchases yet 😢</p>';
                purchasedTotalDiv.style.display = 'none';
                purchasedCountSpan.textContent = '0 games';
                return;
            }
            
            purchasedContainer.innerHTML = '';
            let total = 0;
            
            purchasedGames.forEach(game => {
                total += game.price;
                const item = document.createElement('div');
                item.className = 'purchased-item';
                item.innerHTML = `
                    <div>
                        <strong>${game.name}</strong><br>
                        <small style="color: #4caf50;">$${game.price}</small>
                    </div>
                    <span>✅ Purchased</span>
                `;
                purchasedContainer.appendChild(item);
            });
            
            purchasedAmountSpan.textContent = total.toFixed(2);
            purchasedTotalDiv.style.display = 'block';
            purchasedCountSpan.textContent = `${purchasedGames.length} game${purchasedGames.length !== 1 ? 's' : ''}`;
        }

        async function purchase() {
            if (cart.length === 0) {
                showMessage('Cart is empty!', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/api/cart/purchase?user_id=${currentUserId}`, {
                    method: 'POST'
                });
                const data = await response.json();
                
                if (response.ok) {
                    showMessage(data.message);
                    await loadCart();
                    await loadPurchasedGames();
                    // If dashboard is open, refresh display
                    if (dashboardVisible) {
                        updateCartDisplay();
                        updatePurchasedDisplay();
                    }
                } else {
                    showMessage(data.detail || 'Purchase failed', 'error');
                }
            } catch (error) {
                showMessage('Error processing purchase', 'error');
            }
        }
    </script>
</body>
</html>
